name: Claude Code PR Review

permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      github.event.sender.login == 'sudame' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/request-review')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH?TOKEN }}
          claude_args: |
            --max-turns 20
            --allowedTools
              Bash(gh pr view:*),
              Bash(gh repo view:*),
              Bash(gh pr list:*),
              Bash(gh api:*),
              Bash(git diff:*),
              Bash(git log:*),
              Bash(git show:*),
              Bash(git branch:*),
              Skill(reviewing-pull-request:*)
          prompt: |
            PR #${{ github.event.issue.number }} をレビューしてください。
            レビュー前に、PR の過去のコメント・レビュー・インラインコメントへの返信をすべて確認し、開発者の意見や反論を理解した上でレビューしてください。
            /reviewing-pull-request を使って、インラインコメントと総評を GitHub に投稿してください。
