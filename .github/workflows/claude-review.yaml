name: Claude Code PR Review

permissions:
  contents: read
  pull-requests: write
  id-token: write

on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/request-review')
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-northeast-1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-northeast-1

      - uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_bedrock: "true"
          claude_args: '--model "arn:aws:bedrock:ap-northeast-1:369264854262:application-inference-profile/0nd6go9xrzg0" --max-turns 20'
          additional_permissions: |
            Bash(gh pr view:*)
            Bash(gh repo view:*)
            Bash(gh pr list:*)
            Bash(gh api:*)
            Bash(git diff:*)
            Bash(git log:*)
            Bash(git show:*)
          prompt: |
            PR #${{ github.event.issue.number }} をレビューしてください。
            reviewing-pull-request スキルを使って、インラインコメントと総評を GitHub に投稿してください。
